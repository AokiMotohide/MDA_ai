# @package _global_
defaults:
  - override /model: da3_depth

# seed for random number generators in pytorch, numpy and python.random
seed: 420


tags: ["train", "stream3r"]

task_name: mog_sky_randpretrain_full
slurm_job_id: 99999 # must set in the command line

paths:
  run_folder_name: ${task_name}_${slurm_job_id}

logger:
  wandb:
    name: ${task_name}_${slurm_job_id}
    project: da3

data:
  data_scaling: 1.0
  data_root: /data
  num_views: 24
  resolution:
    - [504, 504]
    - [504, 378]
    - [504, 336]
    - [504, 280]
    - [504, 210]
    - [504, 154]
    - [378, 504]
    - [336, 504]
    - [280, 504]

  allow_repeat: true
  n_corres_train: 0
  data_module:
    _target_: src.dust3r.multiview_dust3r_datamodule.MultiViewDUSt3RDataModule
    pin_memory: true
    num_workers: 4
    num_workers_val: 0 # have to be a low number when using DeepSpeed ZeRO-2
    batch_size_per_device: 1
    batch_size_per_device_val: 1
    use_dynamic_sampler: true
    max_num_of_images_per_gpu: 72
    max_sequence_length: 16
    train_datasets:
      - 160000 @ OmniWorldGame_Multi(allow_repeat=${data.allow_repeat}, split=None, ROOT="data/cut3r_data/OmniWorld_game/", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 260000 @ TartanAir_Multi(allow_repeat=${data.allow_repeat}, split=None, ROOT="data/cut3r_data/tartanair_cut3r/", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 112000 @ HyperSim_Multi(allow_repeat=${data.allow_repeat}, split='train', ROOT="data/cut3r_data/hypersim_cut3r", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 112000 @ Aria_Seq(allow_repeat=${data.allow_repeat}, split=None, ROOT="data/cut3r_data/ase_processed/", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 112000 @ DynamicReplica(allow_repeat=${data.allow_repeat}, split='train', ROOT="data/cut3r_data/dynamic_replica_cut3r/", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 56000 @ PointOdyssey_Multi(allow_repeat=${data.allow_repeat}, split='train', ROOT="data/cut3r_data/point_odyssey_v1.2_cut3r/", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 56000 @ VirtualKITTI2_Multi(allow_repeat=${data.allow_repeat}, split=None, ROOT="data/cut3r_data/processed_vkitti/mast3r_data/processed_vkitti", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 1680 @ UnReal4K_Multi(allow_repeat=${data.allow_repeat}, split=None, ROOT="data/cut3r_data/UnrealStereo4K_cut3r/", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) +
      - 16000 @ Spring(allow_repeat=${data.allow_repeat}, split='train', ROOT="data/cut3r_data/processed_spring/train", aug_crop=16, resolution=${data.resolution}, transform=ColorJitter, num_views=${data.num_views}, n_corres=${data.n_corres_train}, non_sequential_readout=True, rand_sampling=False) 

model:
  pretrained: checkpoints/DA3-GIANT/model.safetensors
  saved_path: logs/${task_name}/runs/${task_name}_${slurm_job_id}/checkpoints

  net:
    _target_: src.training.da3_wrapper.DA3Wrapper
    config_path: src/depth_anything_3/configs/da3-giant-cam-mog-sky.yaml  
    calculate_conf: true
    set_freeze: head,cam_dec
    pretrain_as_possible: true
  
  scheduler:
    warmup_start_lr: 3e-5
    warmup_epochs: 1

  train_criterion:
    _target_: src.training.losses.MultiLossOnlyDepthMogMultiSingleCamMogSkymask
    gradient_loss: grad
    is_metric: false
    clamp_logp: true
    loss_type: logl2
    detach_depth_scale_in_ptsloss: true

  validation_criterion:
    _target_: src.training.losses.MultiLoss

  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 3e-5
    betas:
      - 0.9
      - 0.95
    weight_decay: 0.05

trainer:
  devices: auto
  max_epochs: 10
  accumulate_grad_batches: 2
  strategy:
    _target_: lightning.pytorch.strategies.DDPStrategy
    timeout:
      _target_: datetime.timedelta
      minutes: 80
    find_unused_parameters: true
  plugins: null
  limit_val_batches: 0
  log_every_n_steps: 1
  gradient_clip_val: 3
  # precision: bf16-mixed

callbacks:
  model_checkpoint:
    every_n_train_steps: 500
    every_n_epochs: null
    save_top_k: 3
    filename: "{epoch:03d}-{step:08d}"
    save_last: true
    monitor: "train/loss"
    save_weights_only: true
    dirpath: logs/${task_name}/runs/${task_name}_${slurm_job_id}/
  early_stopping:
    monitor: "train/loss"